<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<title>Issues Tracker</title>
</head>

<body class="bg-gray-100">

<!-- NAVBAR -->
<div class="navbar bg-white shadow px-6">
<div class="flex-1 font-bold text-lg">
GitHub Issues Tracker
</div>

<div class="flex gap-2">
<input
id="searchInput"
type="text"
placeholder="Search issues..."
class="input input-bordered input-sm"
/>

<button onclick="searchIssue()" class="btn btn-primary btn-sm">
Search
</button>
</div>
</div>

<!-- MAIN -->
<div class="max-w-7xl mx-auto p-6">

<!-- TABS -->
<div class="tabs tabs-boxed mb-6">
<button id="allTab" onclick="filterIssues('all')" class="tab tab-active">All</button>
<button id="openTab" onclick="filterIssues('open')" class="tab">Open</button>
<button id="closedTab" onclick="filterIssues('closed')" class="tab">Closed</button>
</div>

<!-- HEADER -->
<div class="flex justify-between items-center mb-6">

<div class="flex items-center gap-3">

<div class="text-2xl">
<img src="./assets/Aperture.png" alt="">
</div>

<div>
<h2 id="issueCount" class="font-bold text-lg">Issues</h2>
<p class="text-gray-500 text-sm">
Track and manage project issues
</p>
</div>

</div>


<div class="flex gap-4 text-sm">


<div class="flex items-center gap-2">
<div class="w-3 h-3 bg-green-500 rounded-full"></div>
Open
</div>


<div class="flex items-center gap-2">
<div class="w-3 h-3 bg-purple-500 rounded-full"></div>
Closed
</div>


</div>


</div>




<!-- LOADING -->


<div id="loader" class="text-center py-10 hidden">
<span class="loading loading-spinner loading-lg"></span>
</div>




<!-- ISSUES GRID -->


<div
id="issuesContainer"
class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4"
></div>


</div>




<!-- MODAL -->


<dialog id="issueModal" class="modal">


<div class="modal-box">


<h3 id="modalTitle" class="font-bold text-lg"></h3>


<p id="modalDesc" class="py-2"></p>


<p id="modalStatus"></p>
<p id="modalAuthor"></p>
<p id="modalPriotity" ></p>
<p id="modalDate"></p>
<div class="modal-action">
<form method="dialog">
<button class="btn btn-primary">Close</button>
</form>
</div>


</div>


</dialog>



<script src="app.js"></script>

</body>
</html>
